[build-system]
requires = ["flit-core==3.12"]
build-backend = "flit_core.buildapi"

[project]
name = "inifix-pre-commit"
version = "0.0.0"
description = "Pre-commit hooks backed by inifix (non-functional)"
readme = "README.md"
authors = [
    { name = "C.M.T Robert" },
]
license = "GPL-3.0-only"
license-files = ["LICENSE"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]
requires-python = ">=3.11"
dependencies = []

[project.urls]
Homepage = "https://github.com/la-niche/inifix-pre-commit"
